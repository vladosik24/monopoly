<html lang="uk">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Монополія Україна</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#005BBB">
<style>
  :root {
    --gold: #F4C542; --blue: #005BBB; --yellow: #FFD700;
    --red: #D62B2B; --green: #2E7D32; --bg: #0a0f1e;
    --card: #111827; --border: #1e3a5f; --text: #e8eaf6; --muted: #6b7a99;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .screen.active { display: flex; }

  /* LOBBY */
  .logo-big { font-size: 64px; margin-bottom: 8px; }
  h1 { font-size: 28px; color: var(--gold); font-weight: 900; text-align: center; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 40px; text-align: center; }
  .card-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 24px; width: 100%; max-width: 400px; margin-bottom: 16px; }
  .card-box h3 { color: var(--gold); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
  input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 15px; outline: none; margin-bottom: 10px; }
  input:focus { border-color: var(--gold); }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-bottom: 8px; }
  .btn-blue { background: linear-gradient(135deg, var(--blue), #0073e6); color: white; }
  .btn-green { background: linear-gradient(135deg, var(--green), #1b5e20); color: white; }
  .btn-gray { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
  .btn:hover { transform: translateY(-2px); opacity: 0.9; }

  /* WAITING */
  .room-code { font-size: 48px; font-weight: 900; color: var(--gold); letter-spacing: 8px; text-align: center; margin: 20px 0; }
  .players-list { width: 100%; max-width: 400px; }
  .player-item { display: flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; }
  .player-dot { width: 12px; height: 12px; border-radius: 50%; }
  .player-item-name { font-size: 15px; }
  .player-item-host { font-size: 11px; color: var(--gold); margin-left: auto; }
  .waiting-text { color: var(--muted); font-size: 14px; text-align: center; margin: 16px 0; animation: blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* GAME */
  #gameScreen { padding: 0; align-items: stretch; justify-content: flex-start; }
  .game-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .game-title { font-size: 14px; font-weight: 900; color: var(--gold); }
  .bank-display { font-size: 12px; color: var(--muted); }
  .bank-display span { color: var(--green); font-weight: 700; }

  .board-container { padding: 6px; flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; }
  .board { display: grid; grid-template-columns: repeat(11,1fr); grid-template-rows: repeat(11,1fr); gap: 2px; width: 100%; aspect-ratio: 1; max-width: 480px; }
  .cell { background: var(--card); border: 1px solid var(--border); border-radius: 3px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1px; position: relative; overflow: hidden; cursor: pointer; }
  .cell.corner { background: rgba(244,197,66,0.08); border-color: rgba(244,197,66,0.3); }
  .cell.center { grid-column:2/11; grid-row:2/11; background: rgba(0,91,187,0.05); border: 2px solid rgba(0,91,187,0.2); border-radius: 8px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .cell-bar { width:100%; height:4px; flex-shrink:0; }
  .cell-icon { font-size: 9px; }
  .cell-name { font-size: 4.5px; text-align:center; color: var(--text); line-height:1.2; padding:0 1px; }
  .cell-price { font-size: 4px; color: var(--gold); }
  .player-token { position:absolute; font-size:8px; width:11px; height:11px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:1px solid rgba(255,255,255,0.4); z-index:3; pointer-events:none; }
  .owned-dot { position:absolute; bottom:1px; right:1px; width:5px; height:5px; border-radius:50%; }

  .game-panel { background: var(--card); border-top: 1px solid var(--border); padding: 10px 14px; flex-shrink: 0; }
  .log-area { height: 44px; overflow-y: auto; font-size: 11px; color: var(--muted); margin-bottom: 8px; display:flex; flex-direction:column-reverse; }
  .log-entry.hl { color: var(--gold); }
  .log-entry.ok { color: #4caf50; }
  .log-entry.err { color: var(--red); }

  .players-bar { display:flex; gap:6px; overflow-x:auto; margin-bottom:8px; scrollbar-width:none; }
  .player-chip { background: rgba(255,255,255,0.04); border: 2px solid var(--border); border-radius: 10px; padding: 6px 10px; min-width: 100px; flex-shrink:0; }
  .player-chip.active { border-color: var(--gold); background: rgba(244,197,66,0.07); }
  .player-chip.bankrupt { opacity:0.35; border-color: var(--red); }
  .chip-top { display:flex; align-items:center; gap:5px; margin-bottom:3px; }
  .chip-name { font-size:11px; font-weight:700; }
  .chip-money { font-size:13px; font-weight:900; color: var(--gold); }
  .chip-pos { font-size:9px; color: var(--muted); }

  .action-row { display:flex; gap:8px; align-items:center; }
  .dice-box { display:flex; gap:5px; }
  .die { width:34px; height:34px; background:white; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:20px; color:#111; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
  .btn-roll { flex:1; padding:12px; background:linear-gradient(135deg,var(--blue),#003d82); border:none; border-radius:12px; color:white; font-size:13px; font-weight:700; cursor:pointer; }
  .btn-roll:disabled { opacity:0.35; cursor:not-allowed; }
  .my-turn-badge { background: var(--gold); color: #000; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; text-align:center; margin-bottom:6px; display:none; }
  .my-turn-badge.show { display:block; }

  /* MODALS */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; align-items:flex-end; justify-content:center; padding:16px; backdrop-filter:blur(4px); }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:24px 24px 16px 16px; padding:22px; width:100%; max-width:460px; }
  .modal-head { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .modal-ico { font-size:32px; }
  .modal-title { font-size:16px; font-weight:900; color:var(--gold); }
  .modal-sub { font-size:12px; color:var(--muted); }
  .prop-stats { background:rgba(255,255,255,0.04); border-radius:10px; padding:12px; margin:10px 0; }
  .ps-row { display:flex; justify-content:space-between; font-size:13px; padding:3px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
  .ps-row:last-child { border-bottom:none; }
  .ps-label { color:var(--muted); }
  .ps-val { font-weight:700; color:var(--gold); }
  .modal-btns { display:flex; gap:8px; margin-top:14px; }
  .mbtn-buy { flex:2; padding:13px; background:linear-gradient(135deg,var(--green),#1b5e20); border:none; border-radius:10px; color:white; font-weight:700; cursor:pointer; }
  .mbtn-skip { flex:1; padding:13px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:10px; color:var(--muted); cursor:pointer; }
  .mbtn-ok { width:100%; padding:13px; background:linear-gradient(135deg,var(--blue),#003d82); border:none; border-radius:10px; color:white; font-weight:700; cursor:pointer; margin-top:12px; }

  /* WIN */
  #winScreen { text-align:center; }
  .win-emoji { font-size:80px; animation: bounce 0.6s ease infinite alternate; }
  @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-16px)} }
  .win-title { font-size:32px; font-weight:900; color:var(--gold); margin:16px 0 8px; }
  .win-sub { color:var(--muted); margin-bottom:32px; }
  .end-stats { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; width:100%; max-width:360px; margin:0 auto 24px; }
  .stat-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:14px; }
  .stat-row:last-child { border-bottom:none; }
</style>
</head>

<!-- LOBBY -->
<div id="lobbyScreen" class="screen active">
  <div class="logo-big">🏛️</div>
  <h1>МОНОПОЛІЯ УКРАЇНА</h1>

    <h3>Ваше ім'я</h3>

  </div>

  <div class="card-box">
    <h3>Приєднатись</h3>
    <input id="roomCodeInput" placeholder="Код кімнати (4 цифри)" maxlength="6" style="text-align:center;font-size:22px;letter-spacing:6px"/>
    <button class="btn btn-blue" onclick="joinRoom()">🚪 Увійти</button>
  </div>
</div>

<!-- WAITING -->
<div id="waitScreen" class="screen">
  <div class="logo-big">🎲</div>
  <h1>Кімната</h1>
  <div class="room-code" id="displayCode">----</div>
  <p class="sub">Поділіться кодом з друзями</p>
  <div class="players-list" id="waitingPlayers"></div>
  <p class="waiting-text" id="waitingText">Очікування гравців...</p>
  <button class="btn btn-green" id="startBtn" style="max-width:400px;display:none" onclick="hostStartGame()">▶ ПОЧАТИ ГРУ</button>
  <button class="btn btn-gray" style="max-width:400px;margin-top:8px" onclick="leaveRoom()">← Вийти</button>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div class="game-header">
    <div class="game-title">🇺🇦 МОНОПОЛІЯ</div>
    <div class="bank-display">Банк: <span id="bankDisplay">₴150,000</span></div>
  </div>
  <div class="board-container">
    <div class="board" id="board"></div>
  </div>
  <div class="game-panel">
    <div class="log-area" id="logArea"></div>
    <div class="my-turn-badge" id="myTurnBadge">🎲 ВАШ ХІД!</div>
    <div class="players-bar" id="playersBar"></div>
    <div class="action-row">
      <div class="dice-box" id="diceDisplay">
        <div class="die">🎲</div>
        <div class="die">🎲</div>
      </div>
      <button class="btn-roll" id="rollBtn" onclick="rollDice()" disabled>🎲 КИНУТИ</button>
    </div>
  </div>
</div>

<!-- WIN -->
<div id="winScreen" class="screen">
  <div class="win-emoji" id="winEmoji">🏆</div>
  <div class="win-title" id="winTitle">ПЕРЕМОГА!</div>
  <div class="win-sub" id="winSub"></div>
  <div class="end-stats" id="endStats"></div>
  <button class="btn btn-blue" style="max-width:360px" onclick="backToLobby()">🔄 НОВА ГРА</button>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="buyModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-ico" id="bIcon"></div>
      <div><div class="modal-title" id="bName"></div><div class="modal-sub" id="bGroup"></div></div>
    </div>
    <div class="prop-stats">
      <div class="ps-row"><span class="ps-label">Ціна</span><span class="ps-val" id="bPrice"></span></div>
      <div class="ps-row"><span class="ps-label">Оренда</span><span class="ps-val" id="bRent"></span></div>
      <div class="ps-row"><span class="ps-label">З готелем</span><span class="ps-val" id="bHotel"></span></div>
      <div class="ps-row"><span class="ps-label">Будинок</span><span class="ps-val" id="bHouse"></span></div>
    </div>
    <div class="modal-btns">
      <button class="mbtn-buy" id="confirmBuy">💰 КУПИТИ</button>
      <button class="mbtn-skip" onclick="sendAction({type:'skip_buy'})">Пропустити</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-ico" id="evIcon"></div>
      <div><div class="modal-title" id="evTitle"></div></div>
    </div>
    <div style="padding:12px 0;font-size:14px" id="evText"></div>
    <div style="font-size:24px;font-weight:900;color:var(--gold);text-align:center" id="evAmount"></div>
    <button class="mbtn-ok" onclick="closeEventModal()">ОК</button>
  </div>
</div>

  {text:'Спадщина! +₴5000',amount:5000,icon:'🏠'},
  {text:'Комунальні. -₴800',amount:-800,icon:'💡'},
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let myId = 'p_' + Math.random().toString(36).substr(2,8);
let roomCode = null;
let isHost = false;
let myIndex = -1;
let gameState = null;
let roomRef = null;
let unsubscribe = null;
let pendingBuyCellId = null;
let chanceIdx=0, chestIdx=0;

// ── ROOM HELPERS ──────────────────────────────────────────────────────────────
function genCode(){ return Math.floor(1000+Math.random()*9000).toString(); }

window.createRoom = async function(){
  const name = document.getElementById('myName').value.trim() || 'Гравець';
  roomCode = genCode();
  isHost = true;
  myIndex = 0;
  roomRef = ref(db, 'rooms/' + roomCode);
  await set(roomRef, {
    host: myId,
    status: 'waiting',
    players: { [myId]: { name, avatar: AV[0], color: PC[0], index: 0 } }
  });
  showScreen('waitScreen');
  document.getElementById('displayCode').textContent = roomCode;
  listenRoom();
};

window.joinRoom = async function(){
  const code = document.getElementById('roomCodeInput').value.trim();
  const name = document.getElementById('myName').value.trim() || 'Гравець';
  if(!code){ alert('Введіть код кімнати'); return; }
  roomCode = code;
  isHost = false;
  roomRef = ref(db, 'rooms/' + roomCode);
  const snap = await get(roomRef);
  if(!snap.exists()){ alert('Кімнату не знайдено!'); return; }
  const data = snap.val();
  if(data.status !== 'waiting'){ alert('Гра вже почалась!'); return; }
  const pCount = Object.keys(data.players||{}).length;
  if(pCount >= 4){ alert('Кімната повна!'); return; }
  myIndex = pCount;
  await update(ref(db, 'rooms/'+roomCode+'/players'), {
    [myId]: { name, avatar: AV[myIndex], color: PC[myIndex], index: myIndex }
  });
  showScreen('waitScreen');
  document.getElementById('displayCode').textContent = roomCode;
  listenRoom();
};

window.leaveRoom = async function(){
  if(roomRef) await remove(ref(db,'rooms/'+roomCode+'/players/'+myId));
  if(unsubscribe) unsubscribe();
  showScreen('lobbyScreen');
};

window.hostStartGame = async function(){
  const snap = await get(roomRef);
  const data = snap.val();
  const playersArr = Object.values(data.players).sort((a,b)=>a.index-b.index);
  const gs = initGameState(playersArr);
  await update(roomRef, { status:'playing', gameState: gs });
};

function listenRoom(){
  if(unsubscribe) unsubscribe();
  const unsub = onValue(roomRef, snap => {
    if(!snap.exists()) return;
    const data = snap.val();
    renderWaitingPlayers(data.players||{});
    if(data.status === 'playing' && data.gameState){
      gameState = data.gameState;
      if(document.getElementById('waitScreen').classList.contains('active')){
        showScreen('gameScreen');
        renderBoard();
      }
      applyGameState();
    }
    if(data.status === 'won') showWin(data.gameState);
    const pCount = Object.keys(data.players||{}).length;
    const startBtn = document.getElementById('startBtn');
    if(isHost && pCount >= 2){
      startBtn.style.display='block';
      document.getElementById('waitingText').style.display='none';
    } else {
      startBtn.style.display='none';
    }
  });
  unsubscribe = unsub;
}

function renderWaitingPlayers(players){
  const list = document.getElementById('waitingPlayers'); list.innerHTML='';
  Object.values(players).sort((a,b)=>a.index-b.index).forEach(p=>{
    const div=document.createElement('div'); div.className='player-item';
    div.innerHTML=`<div class="player-dot" style="background:${p.color}"></div><div class="player-item-name">${p.avatar} ${p.name}</div>${p.index===0?'<div class="player-item-host">Хост</div>':''}`;
    list.appendChild(div);
  });
}

// ── GAME STATE INIT ───────────────────────────────────────────────────────────
function initGameState(playersArr){
  return {
    players: playersArr.map((p,i)=>({
      name:p.name, avatar:p.avatar, color:p.color,
      money:15000, pos:0, bankrupt:false, inJail:false, jailTurns:0, index:i
    })),
    currentPlayerIdx: 0,
    bankMoney: 150000,
    owned: {},
    houses: {},
    log: [],
    chanceIdx: 0,
    chestIdx: 0,
    diceRolled: false,
    gameOver: false,
    lastDice: [1,1],
  };
}

// ── APPLY STATE TO UI ─────────────────────────────────────────────────────────
function applyGameState(){
  const gs = gameState;
  if(!gs) return;
  document.getElementById('bankDisplay').textContent = '₴'+(gs.bankMoney||0).toLocaleString();
  renderPlayers(gs);
  renderOwnedIndicators(gs);
  renderTokens(gs);
  updateLog(gs);

  const isMyTurn = gs.players[gs.currentPlayerIdx] && myIndex === gs.currentPlayerIdx;
  const badge = document.getElementById('myTurnBadge');
  badge.classList.toggle('show', isMyTurn && !gs.diceRolled);

  const rollBtn = document.getElementById('rollBtn');
  rollBtn.disabled = !isMyTurn || gs.diceRolled || gs.gameOver;

  if(gs.lastDice){
    document.getElementById('diceDisplay').innerHTML=
      `<div class="die">${DICE_F[gs.lastDice[0]]}</div><div class="die">${DICE_F[gs.lastDice[1]]}</div>`;
  }

  if(gs.gameOver) showWin(gs);

  // Show buy modal if pending for me
  if(gs.pendingBuy && gs.pendingBuy.playerIdx === myIndex){
    showBuyModal(gs.pendingBuy.cellId);
  } else {
    closeBuyModal();
  }

  // Show event modal
  if(gs.pendingEvent && gs.pendingEvent.playerIdx === myIndex){
    showEvModal(gs.pendingEvent);
  }
}

// ── DICE ──────────────────────────────────────────────────────────────────────
window.rollDice = async function(){
  if(!gameState || gameState.diceRolled) return;
  const gs = JSON.parse(JSON.stringify(gameState));
  const d1=Math.ceil(Math.random()*6), d2=Math.ceil(Math.random()*6), total=d1+d2;
  gs.lastDice=[d1,d2];
  gs.diceRolled=true;
  addLogGS(gs, `${gs.players[gs.currentPlayerIdx].avatar} ${gs.players[gs.currentPlayerIdx].name} кинув ${d1}+${d2}=${total}`);

  const p=gs.players[gs.currentPlayerIdx];

  if(p.inJail){
    p.jailTurns=(p.jailTurns||0)+1;
    if(d1===d2){p.inJail=false;p.jailTurns=0;addLogGS(gs,`✅ ${p.name} вийшов з вязниці!`);}
    else if(p.jailTurns>=3){p.inJail=false;p.jailTurns=0;p.money-=500;gs.bankMoney+=500;addLogGS(gs,`${p.name} заплатив ₴500 за звільнення.`);}
    else{addLogGS(gs,`${p.name} у вязниці. Спроба ${p.jailTurns}.`);gs.diceRolled=true;await saveGS(gs);setTimeout(()=>endTurnGS(gs),1500);return;}
  }

  const oldPos=p.pos;
  const newPos=(oldPos+total)%40;
  if(newPos<oldPos||(oldPos+total>=40)){p.money+=2000;gs.bankMoney-=2000;addLogGS(gs,`${p.name} пройшов СТАРТ! +₴2000`);}
  p.pos=newPos;
  addLogGS(gs,`${p.avatar} ${p.name} → ${BOARD[newPos].name}`);

  await processLanding(gs, gs.currentPlayerIdx, newPos);
};

async function processLanding(gs, pIdx, pos){
  const p=gs.players[pIdx];
  const cell=BOARD[pos];

  if(cell.type==='corner'){
    if(cell.id===30){p.pos=10;p.inJail=true;p.jailTurns=0;addLogGS(gs,`⛓️ ${p.name} відправлений до вязниці!`);
      gs.pendingEvent={playerIdx:pIdx,icon:'⛓️',title:'ВЯЗНИЦЯ!',text:`${p.name} відправлений до вязниці!`,amount:''};
      await saveGS(gs);return;}
    await endTurnGS(gs);return;
  }

  if(cell.type==='tax'){
    p.money-=cell.amount;gs.bankMoney+=cell.amount;
    addLogGS(gs,`📋 ${p.name} сплатив податок ₴${cell.amount}`);
    gs.pendingEvent={playerIdx:pIdx,icon:'📋',title:cell.name,text:`Ви сплатили ₴${cell.amount}`,amount:`-₴${cell.amount}`};
    await saveGS(gs);return;
  }

  if(cell.type==='chance'||cell.type==='chest'){
    const deck=cell.type==='chance'?CHANCE:CHEST;
    const cardIdx=cell.type==='chance'?gs.chanceIdx:gs.chestIdx;
    const card=deck[cardIdx%deck.length];
    if(cell.type==='chance')gs.chanceIdx++;else gs.chestIdx++;
    applyCard(gs,pIdx,card);
    gs.pendingEvent={playerIdx:pIdx,icon:card.icon,title:cell.type==='chance'?'ШАНС':'СКАРБНИЦЯ',text:card.text,amount:card.amount?(card.amount>0?'+₴'+card.amount:'-₴'+Math.abs(card.amount)):''};
    await saveGS(gs);return;
  }

  if(cell.type==='property'||cell.type==='station'||cell.type==='utility'){
    const ownerIdx=gs.owned[cell.id];
    if(ownerIdx===undefined||ownerIdx===null){
      if(p.money>=cell.price){
        gs.pendingBuy={playerIdx:pIdx,cellId:cell.id};
        await saveGS(gs);
      } else {
        addLogGS(gs,`${p.name} не може купити — мало грошей.`);
        await endTurnGS(gs);
      }
      return;
    }
    if(ownerIdx===pIdx){addLogGS(gs,`${p.name} на власній власності.`);await endTurnGS(gs);return;}
    const owner=gs.players[ownerIdx];
    if(owner.bankrupt){await endTurnGS(gs);return;}
    const rent=calcRent(gs,cell,ownerIdx);
    p.money-=rent;owner.money+=rent;
    addLogGS(gs,`💸 ${p.name} сплатив ₴${rent} → ${owner.name}`);
    gs.pendingEvent={playerIdx:pIdx,icon:'💸',title:'Оренда! '+cell.name,text:`${p.name} сплатив оренду ${owner.name}`,amount:`-₴${rent}`};
    checkBankruptcy(gs,pIdx);
    await saveGS(gs);return;
  }
  await endTurnGS(gs);
}

function applyCard(gs,pIdx,card){
  const p=gs.players[pIdx];
  if(card.action==='jail'){p.pos=10;p.inJail=true;p.jailTurns=0;return;}
  if(card.action==='goto'){p.pos=card.target;if(card.amount>0){p.money+=card.amount;gs.bankMoney-=card.amount;}return;}
  if(card.action==='collect'){
    gs.players.forEach((pl,i)=>{if(i!==pIdx&&!pl.bankrupt){pl.money-=card.amount;p.money+=card.amount;}});return;
  }
  if(card.action==='repair'){
    let total=0;
    Object.entries(gs.owned||{}).forEach(([id,pi])=>{if(pi===pIdx)total+=(gs.houses[id]||0)*card.amount;});
    p.money-=total;gs.bankMoney+=total;return;
  }
  if(card.amount>0){p.money+=card.amount;gs.bankMoney-=card.amount;}
  else{p.money-=Math.abs(card.amount);gs.bankMoney+=Math.abs(card.amount);}
  checkBankruptcy(gs,pIdx);
}

function calcRent(gs,cell,ownerIdx){
  if(cell.type==='station'){const cnt=BOARD.filter(b=>b.type==='station'&&gs.owned[b.id]===ownerIdx).length;return cell.rent[Math.min(cnt-1,cell.rent.length-1)];}
  if(cell.type==='utility'){const cnt=BOARD.filter(b=>b.type==='utility'&&gs.owned[b.id]===ownerIdx).length;return cnt>=2?1200:600;}
  const h=gs.houses[cell.id]||0;return cell.rent[Math.min(h,cell.rent.length-1)];
}

function checkBankruptcy(gs,pIdx){
  const p=gs.players[pIdx];
  if(p.money<=0){p.bankrupt=true;p.money=0;
    Object.keys(gs.owned||{}).forEach(id=>{if(gs.owned[id]===pIdx)delete gs.owned[id];});
    addLogGS(gs,`💀 ${p.name} збанкрутував!`);
  }
}

async function endTurnGS(gs){
  gs.diceRolled=false; gs.pendingBuy=null; gs.pendingEvent=null;
  const active=gs.players.filter(p=>!p.bankrupt);
  if(active.length<=1){gs.gameOver=true;await update(roomRef,{status:'won',gameState:gs});return;}
  do{gs.currentPlayerIdx=(gs.currentPlayerIdx+1)%gs.players.length;}
  while(gs.players[gs.currentPlayerIdx].bankrupt);
  addLogGS(gs,`Хід: ${gs.players[gs.currentPlayerIdx].avatar} ${gs.players[gs.currentPlayerIdx].name}`);
  await saveGS(gs);
}

async function saveGS(gs){ await update(roomRef,{gameState:gs}); }
function addLogGS(gs,msg){gs.log=gs.log||[];gs.log.unshift(msg);if(gs.log.length>20)gs.log.pop();}

// ── BUY ──────────────────────────────────────────────────────────────────────
window.sendAction = async function(action){
  const gs=JSON.parse(JSON.stringify(gameState));
  if(action.type==='buy'){
    const cell=BOARD[action.cellId];
    const p=gs.players[gs.currentPlayerIdx];
    p.money-=cell.price;gs.bankMoney+=cell.price;
    gs.owned[action.cellId]=gs.currentPlayerIdx;
    addLogGS(gs,`✅ ${p.name} купив ${cell.name} за ₴${cell.price}!`);
    gs.pendingBuy=null;
    await endTurnGS(gs);
  }
  if(action.type==='skip_buy'){
    gs.pendingBuy=null;
    await endTurnGS(gs);
  }
  if(action.type==='ack_event'){
    gs.pendingEvent=null;
    await endTurnGS(gs);
  }
};

function showBuyModal(cellId){
  const cell=BOARD[cellId];
  pendingBuyCellId=cellId;
  document.getElementById('bIcon').textContent=cell.icon;
  document.getElementById('bName').textContent=cell.name;
  document.getElementById('bGroup').textContent=cell.type==='property'?GN[cell.group]+' група':cell.type==='station'?'Залізниця/Аеропорт':'Комунальна';
  document.getElementById('bPrice').textContent='₴'+cell.price;
  document.getElementById('bRent').textContent=cell.rent?'₴'+cell.rent[0]:'—';
  document.getElementById('bHotel').textContent=cell.rent&&cell.rent[5]?'₴'+cell.rent[5]:'—';
  document.getElementById('bHouse').textContent=cell.housePrice?'₴'+cell.housePrice:'—';
  document.getElementById('confirmBuy').onclick=()=>sendAction({type:'buy',cellId});
  document.getElementById('buyModal').classList.add('open');
}

function closeBuyModal(){ document.getElementById('buyModal').classList.remove('open'); }

function showEvModal(ev){
  document.getElementById('evIcon').textContent=ev.icon;
  document.getElementById('evTitle').textContent=ev.title;
  document.getElementById('evText').textContent=ev.text;
  document.getElementById('evAmount').textContent=ev.amount||'';
  document.getElementById('eventModal').classList.add('open');
}

window.closeEventModal = function(){
  document.getElementById('eventModal').classList.remove('open');
  if(gameState && gameState.pendingEvent && gameState.pendingEvent.playerIdx===myIndex){
    sendAction({type:'ack_event'});
  }
};

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderBoard(){
  const board=document.getElementById('board'); board.innerHTML='';
  const grid=Array.from({length:11},()=>Array(11).fill(null));
  BOARD.forEach(cell=>{const[r,c]=cell.pos;grid[r-1][c-1]=cell;});
  const center=document.createElement('div');
  center.className='cell center';
  center.innerHTML='<div style="font-size:clamp(20px,5vw,48px)">🇺🇦</div><div style="font-size:clamp(7px,1.5vw,14px);color:var(--gold);font-weight:900;text-align:center">МОНОПОЛІЯ<br>УКРАЇНА</div>';
  for(let r=0;r<11;r++){
    for(let c=0;c<11;c++){
      if(r>=1&&r<=9&&c>=1&&c<=9){if(r===1&&c===1)board.appendChild(center);continue;}
      const cell=grid[r][c];
      if(!cell){const e=document.createElement('div');e.style.background='transparent';board.appendChild(e);continue;}
      const el=document.createElement('div');
      el.className='cell'+(cell.type==='corner'?' corner':'');
      el.id='cell-'+cell.id;
      let bar=cell.type==='property'?`<div class="cell-bar" style="background:${GC[cell.group]}"></div>`:'';
      el.innerHTML=`${bar}<div class="cell-icon">${cell.icon}</div><div class="cell-name">${cell.name}</div>${cell.price?`<div class="cell-price">₴${cell.price}</div>`:''}`;
      board.appendChild(el);
    }
  }
}

function renderOwnedIndicators(gs){
  document.querySelectorAll('.owned-dot').forEach(d=>d.remove());
  Object.entries(gs.owned||{}).forEach(([id,pi])=>{
    const el=document.getElementById('cell-'+id); if(!el)return;
    const dot=document.createElement('div');dot.className='owned-dot';
    dot.style.background=gs.players[pi]?gs.players[pi].color:'#fff';
    el.appendChild(dot);
  });
}

function renderTokens(gs){
  document.querySelectorAll('.player-token').forEach(t=>t.remove());
  const off=[[-4,-4],[4,-4],[-4,4],[4,4]];
  gs.players.forEach((p,i)=>{
    if(p.bankrupt)return;
    const cellEl=document.getElementById('cell-'+p.pos); if(!cellEl)return;
    const tok=document.createElement('div');tok.className='player-token';
    tok.textContent=p.avatar;tok.style.background=p.color;
    tok.style.top=`calc(50% + ${off[i%4][1]}px)`;
    tok.style.left=`calc(50% + ${off[i%4][0]}px)`;
    cellEl.appendChild(tok);
  });
}

function renderPlayers(gs){
  const bar=document.getElementById('playersBar'); bar.innerHTML='';
  gs.players.forEach((p,i)=>{
    const chip=document.createElement('div');
    chip.className='player-chip'+(i===gs.currentPlayerIdx?' active':'')+(p.bankrupt?' bankrupt':'');
    chip.innerHTML=`<div class="chip-top"><span>${p.avatar}</span><span class="chip-name" style="color:${p.color}">${p.name}${i===myIndex?' (Ви)':''}</span></div><div class="chip-money">₴${(p.money||0).toLocaleString()}</div><div class="chip-pos">${BOARD[p.pos].name}${p.inJail?' ⛓️':''}${p.bankrupt?' 💀':''}</div>`;
    bar.appendChild(chip);
  });
}

function updateLog(gs){
  const area=document.getElementById('logArea'); area.innerHTML='';
  (gs.log||[]).slice(0,5).forEach(msg=>{
    const e=document.createElement('div');e.className='log-entry';e.textContent=msg;area.appendChild(e);
  });
}

function showWin(gs){
  const active=gs.players.filter(p=>!p.bankrupt);
  const winner=active.length>0?active[0]:gs.players.reduce((a,b)=>a.money>b.money?a:b);
  document.getElementById('winEmoji').textContent=winner.avatar;
  document.getElementById('winTitle').textContent=winner.name+' перемагає!';
  document.getElementById('winSub').textContent='Переможець Монополії України! 🇺🇦';
  const sorted=[...gs.players].sort((a,b)=>b.money-a.money);
  document.getElementById('endStats').innerHTML=sorted.map((p,i)=>`<div class="stat-row"><span>${['🥇','🥈','🥉','4️⃣'][i]} ${p.avatar} ${p.name}</span><span style="color:${i===0?'var(--gold)':'var(--text)'}">₴${p.money.toLocaleString()}</span></div>`).join('');
  showScreen('winScreen');
}

window.backToLobby = function(){ showScreen('lobbyScreen'); };

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/monopoly/sw.js');
}
</script>
