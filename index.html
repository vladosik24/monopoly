<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Монополія Україна</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Geologica:wght@300;400;600&display=swap');

  :root {
    --gold: #F4C542;
    --blue: #005BBB;
    --yellow: #FFD700;
    --red: #D62B2B;
    --green: #2E7D32;
    --bg: #0a0f1e;
    --card: #111827;
    --border: #1e3a5f;
    --text: #e8eaf6;
    --muted: #6b7a99;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Geologica', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    background-image: 
      radial-gradient(ellipse at 20% 20%, rgba(0,91,187,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(244,197,66,0.1) 0%, transparent 50%);
  }

  h1, h2, h3 { font-family: 'Unbounded', sans-serif; }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  #startScreen {
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .flag-stripe {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--blue) 50%, var(--yellow) 50%);
  }

  .trident-bg {
    position: absolute;
    font-size: 300px;
    opacity: 0.03;
    user-select: none;
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .start-content {
    text-align: center;
    z-index: 1;
    width: 100%;
    max-width: 420px;
  }

  .logo {
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .logo-icon {
    font-size: 48px;
    filter: drop-shadow(0 0 20px rgba(244,197,66,0.6));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .logo h1 {
    font-size: clamp(22px, 6vw, 32px);
    background: linear-gradient(135deg, var(--gold), #fff, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    text-align: left;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 40px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .player-setup {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .player-setup h3 {
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .player-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .player-avatar {
    font-size: 28px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .player-avatar:hover { border-color: var(--gold); transform: scale(1.1); }

  .player-name-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Geologica', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .player-name-input:focus { border-color: var(--gold); }

  .player-color {
    width: 20px; height: 20px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .btn-primary {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--blue), #0073e6);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Unbounded', sans-serif;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,91,187,0.4); }
  .btn-primary:active { transform: translateY(0); }

  #gameScreen { padding: 0; }

  .game-header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .game-title { font-family: 'Unbounded', sans-serif; font-size: 14px; color: var(--gold); }
  .bank-display { font-size: 12px; color: var(--muted); }
  .bank-display span { color: var(--green); font-weight: 600; }

  .board-container { padding: 8px; overflow: auto; flex: 1; }

  .board {
    display: grid;
    grid-template-columns: repeat(11, 1fr);
    grid-template-rows: repeat(11, 1fr);
    gap: 2px;
    width: 100%;
    aspect-ratio: 1;
    max-width: 500px;
    margin: 0 auto;
  }

  .cell {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2px;
    position: relative;
    cursor: pointer;
    transition: all 0.15s;
    overflow: hidden;
  }

  .cell:hover { border-color: var(--gold); z-index: 2; }
  .cell.corner { background: rgba(244,197,66,0.08); border-color: rgba(244,197,66,0.3); }

  .cell.center {
    grid-column: 2 / 11;
    grid-row: 2 / 11;
    background: rgba(0,91,187,0.05);
    border: 2px solid rgba(0,91,187,0.2);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .cell-color-bar { width: 100%; height: 5px; border-radius: 2px 2px 0 0; flex-shrink: 0; }
  .cell-name { font-size: 5px; text-align: center; line-height: 1.2; color: var(--text); word-break: break-word; padding: 1px; }
  .cell-price { font-size: 5px; color: var(--gold); font-weight: 600; }
  .cell-icon { font-size: 10px; }

  .player-token {
    position: absolute;
    font-size: 9px;
    width: 12px; height: 12px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.3);
    z-index: 3;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }

  .owned-indicator {
    position: absolute;
    bottom: 1px; right: 1px;
    width: 6px; height: 6px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.5);
  }

  .center-logo { font-size: clamp(24px, 6vw, 60px); margin-bottom: 4px; }
  .center-title { font-family: 'Unbounded', sans-serif; font-size: clamp(8px, 2vw, 16px); color: var(--gold); text-align: center; line-height: 1.3; }

  .game-panel {
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }

  .players-bar { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; }

  .player-chip {
    background: rgba(255,255,255,0.05);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 8px 12px;
    min-width: 120px;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .player-chip.active { border-color: var(--gold); background: rgba(244,197,66,0.08); box-shadow: 0 0 12px rgba(244,197,66,0.2); }
  .player-chip.bankrupt { opacity: 0.4; border-color: var(--red); }

  .chip-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .chip-avatar { font-size: 16px; }
  .chip-name { font-size: 12px; font-weight: 600; }
  .chip-money { font-size: 14px; font-family: 'Unbounded', sans-serif; color: var(--gold); }
  .chip-pos { font-size: 10px; color: var(--muted); }

  .action-area { display: flex; gap: 8px; align-items: center; }

  .btn-dice {
    flex: 1;
    padding: 14px;
    background: linear-gradient(135deg, var(--blue), #003d82);
    border: 2px solid rgba(0,91,187,0.5);
    border-radius: 14px;
    color: white;
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-dice:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,91,187,0.4); }
  .btn-dice:disabled { opacity: 0.4; cursor: not-allowed; }

  .dice-display { display: flex; gap: 6px; }

  .die {
    width: 36px; height: 36px;
    background: white;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #111;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    animation: rollDie 0.4s ease-out;
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
  }

  @keyframes rollDie {
    0% { transform: rotate(0deg) scale(0.5); opacity: 0; }
    60% { transform: rotate(20deg) scale(1.2); }
    100% { transform: rotate(0deg) scale(1); opacity: 1; }
  }

  .log-area {
    height: 50px;
    overflow-y: auto;
    margin-bottom: 10px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    flex-direction: column-reverse;
    gap: 2px;
  }

  .log-entry { padding: 2px 0; }
  .log-entry.highlight { color: var(--gold); }
  .log-entry.danger { color: var(--red); }
  .log-entry.success { color: #4caf50; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    padding: 16px;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px 24px 16px 16px;
    padding: 24px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes slideUp {
    from { transform: translateY(100px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .modal-icon { font-size: 36px; }
  .modal-title { font-family: 'Unbounded', sans-serif; font-size: 16px; color: var(--gold); margin-bottom: 2px; }
  .modal-subtitle { font-size: 12px; color: var(--muted); }

  .property-card-preview { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 14px; margin: 12px 0; }

  .prop-stat { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .prop-stat:last-child { border-bottom: none; }
  .prop-stat .label { color: var(--muted); }
  .prop-stat .value { font-weight: 600; }
  .prop-stat .value.money { color: var(--gold); }

  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }

  .btn-buy {
    flex: 2; padding: 14px;
    background: linear-gradient(135deg, var(--green), #1b5e20);
    border: none; border-radius: 12px;
    color: white; font-family: 'Unbounded', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.2s;
  }

  .btn-skip {
    flex: 1; padding: 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border); border-radius: 12px;
    color: var(--muted); cursor: pointer; transition: all 0.2s;
  }

  .btn-skip:hover { border-color: var(--red); color: var(--red); }

  .btn-ok {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--blue), #003d82);
    border: none; border-radius: 12px;
    color: white; font-family: 'Unbounded', sans-serif;
    font-size: 14px; cursor: pointer; margin-top: 12px;
  }

  #winScreen { align-items: center; justify-content: center; text-align: center; padding: 40px 20px; }

  .win-emoji { font-size: 80px; animation: bounce 0.6s ease infinite alternate; }

  @keyframes bounce {
    from { transform: translateY(0) scale(1); }
    to { transform: translateY(-20px) scale(1.1); }
  }

  .win-title {
    font-size: clamp(28px, 8vw, 48px);
    background: linear-gradient(135deg, var(--gold), #fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 20px 0 8px;
  }

  .win-subtitle { color: var(--muted); font-size: 16px; margin-bottom: 40px; }

  .end-stats {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    width: 100%; max-width: 380px;
    margin: 0 auto 32px;
  }

  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
  .stat-row:last-child { border-bottom: none; }
  .scrollable { max-height: 40vh; overflow-y: auto; }
</style>
</head>
<body>

<div id="startScreen" class="screen active">
  <div class="flag-stripe"></div>
  <div class="trident-bg">🔱</div>
  <div class="start-content">
    <div class="logo">
      <div class="logo-icon">🏛️</div>
      <h1>МОНОПОЛІЯ<br>УКРАЇНА</h1>
    </div>
    <p class="subtitle">Від Карпат до Азовського моря</p>
    <div class="player-setup">
      <h3>Гравці (2–4)</h3>
      <div id="playerRows"></div>
    </div>
    <button class="btn-primary" onclick="startGame()">🎲 ПОЧАТИ ГРУ</button>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div class="game-header">
    <div class="game-title">🇺🇦 МОНОПОЛІЯ</div>
    <div class="bank-display">Банк: <span id="bankDisplay">₴150,000</span></div>
  </div>
  <div class="board-container">
    <div class="board" id="board"></div>
  </div>
  <div class="game-panel">
    <div class="log-area" id="logArea"></div>
    <div class="players-bar" id="playersBar"></div>
    <div class="action-area">
      <div class="dice-display" id="diceDisplay">
        <div class="die">🎲</div>
        <div class="die">🎲</div>
      </div>
      <button class="btn-dice" id="rollBtn" onclick="rollDice()">🎲 КИНУТИ</button>
    </div>
  </div>
</div>

<div id="winScreen" class="screen">
  <div class="win-emoji" id="winEmoji">🏆</div>
  <h1 class="win-title" id="winTitle">ПЕРЕМОГА!</h1>
  <p class="win-subtitle" id="winSubtitle"></p>
  <div class="end-stats scrollable" id="endStats"></div>
  <button class="btn-primary" onclick="resetGame()" style="max-width:380px;width:100%">🔄 НОВА ГРА</button>
</div>

<div class="modal-overlay" id="propertyModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-icon" id="propIcon">🏙️</div>
      <div>
        <div class="modal-title" id="propName"></div>
        <div class="modal-subtitle" id="propGroup"></div>
      </div>
    </div>
    <div class="property-card-preview">
      <div class="prop-stat"><span class="label">Ціна</span><span class="value money" id="propPrice"></span></div>
      <div class="prop-stat"><span class="label">Оренда</span><span class="value money" id="propRent"></span></div>
      <div class="prop-stat"><span class="label">З будинком</span><span class="value money" id="propRentH1"></span></div>
      <div class="prop-stat"><span class="label">З готелем</span><span class="value money" id="propRentHotel"></span></div>
      <div class="prop-stat"><span class="label">Будинок</span><span class="value money" id="propHousePrice"></span></div>
    </div>
    <div class="modal-actions">
      <button class="btn-buy" id="buyBtn">💰 КУПИТИ</button>
      <button class="btn-skip" onclick="closeModal('propertyModal')">Пропустити</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-icon" id="eventIcon">📋</div>
      <div>
        <div class="modal-title" id="eventTitle"></div>
        <div class="modal-subtitle" id="eventSubtitle"></div>
      </div>
    </div>
    <div class="property-card-preview" id="eventBody"></div>
    <button class="btn-ok" onclick="closeModal('eventModal')">ОК</button>
  </div>
</div>

<div class="modal-overlay" id="rentModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-icon">💸</div>
      <div>
        <div class="modal-title" id="rentTitle">Оренда!</div>
        <div class="modal-subtitle" id="rentSubtitle"></div>
      </div>
    </div>
    <div class="property-card-preview" id="rentBody"></div>
    <button class="btn-ok" onclick="closeModal('rentModal')">Сплатити</button>
  </div>
</div>

<div class="modal-overlay" id="taxModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-icon">🏛️</div>
      <div>
        <div class="modal-title" id="taxTitle">Податок</div>
        <div class="modal-subtitle" id="taxSubtitle"></div>
      </div>
    </div>
    <button class="btn-ok" onclick="closeModal('taxModal')">Сплатити</button>
  </div>
</div>

<script>

  {id:25, type:'station',  name:'Морський порт',    icon:'🚢', price:2000, rent:[250,500,1000,2000], pos:[1,6]},
  {id:26, type:'property', name:'Тернопіль',        group:5, price:2600, rent:[220,1100,3300,5000,7000,9000],housePrice:3000,icon:'🏔️', pos:[1,5]},
  {id:27, type:'property', name:'Чернівці',         group:5, price:2600, rent:[220,1100,3300,5000,7000,9000],housePrice:3000,icon:'🌺', pos:[1,4]},
  {id:28, type:'utility',  name:'Нафтогаз',         icon:'⛽', price:1500, pos:[1,3]},
  {id:29, type:'property', name:'Ужгород',          group:5, price:2800, rent:[240,1200,3600,5500,7500,9500],housePrice:3000,icon:'🏞️', pos:[1,2]},
  {id:30, type:'corner',   name:'ЙДИ ДО ВЯЗНИЦІ',  icon:'👮', pos:[1,1]},
  {id:31, type:'property', name:'Одеса',            group:6, price:3000, rent:[260,1300,3900,5750,8000,11000],housePrice:3500,icon:'🌊', pos:[2,1]},
  {id:32, type:'property', name:'Черкаси',          group:6, price:3000, rent:[260,1300,3900,5750,8000,11000],housePrice:3500,icon:'🌸', pos:[3,1]},
  {id:33, type:'chest',    name:'Скарбниця',        icon:'📦', pos:[4,1]},
  {id:34, type:'property', name:'Хортиця',          group:6, price:3200, rent:[280,1500,4500,6250,8750,12500],housePrice:3500,icon:'⚔️', pos:[5,1]},
  {id:35, type:'station',  name:'Аеропорт Схід',    icon:'🛫', price:2000, rent:[250,500,1000,2000], pos:[6,1]},
  {id:36, type:'chance',   name:'Шанс',             icon:'❓', pos:[7,1]},
  {id:37, type:'property', name:'Львів',            group:7, price:3500, rent:[350,1750,5000,7000,9000,12500],housePrice:4000,icon:'🦁', pos:[8,1]},
  {id:38, type:'tax',      name:'Акциз',            amount:100, icon:'📋', pos:[9,1]},
  {id:39, type:'property', name:'Київ',             group:7, price:4000, rent:[500,2000,6000,9000,12000,15000],housePrice:4000,icon:'🏛️', pos:[10,1]},
];

const GROUP_COLORS=['#8B4513','#00CED1','#FF69B4','#FF8C00','#FF0000','#FFD700','#228B22','#00008B'];
const GROUP_NAMES=['Коричнева','Блакитна','Рожева','Оранжева','Червона','Жовта','Зелена','Синя'];

const CHANCE_CARDS=[
  {text:'Премія від держави! Отримайте ₴2000.',amount:2000,icon:'🎁'},
  {text:'Штраф. Заплатіть ₴500.',amount:-500,icon:'🚔'},
  {text:'Йдіть до СТАРТУ! Отримайте ₴2000.',action:'goto',target:0,amount:2000,icon:'🏁'},
  {text:'Отримайте ₴1000 від кожного гравця.',action:'collect',amount:1000,icon:'🤝'},
  {text:'Ремонт: ₴400 за кожен будинок.',action:'repair',amount:400,icon:'🔧'},
  {text:'Виграш у лотерею ₴1500!',amount:1500,icon:'🎰'},
  {text:'Банк повертає ₴500.',amount:500,icon:'🏦'},
  {text:'Прямо до вязниці!',action:'jail',icon:'⛓️'},
  {text:'Відвідали фестиваль. Отримайте ₴300.',amount:300,icon:'🎪'},
  {text:'Фондовий ринок впав. Заплатіть ₴800.',amount:-800,icon:'📉'},
];

const CHEST_CARDS=[
  {text:'День народження! ₴200 від кожного.',action:'collect',amount:200,icon:'🎂'},
  {text:'Продали картину. Отримайте ₴1000.',amount:1000,icon:'🎨'},
  {text:'Лікарня. Заплатіть ₴500.',amount:-500,icon:'🏥'},
  {text:'Повернення податку ₴300!',amount:300,icon:'📊'},
  {text:'Виграш в казино — ₴2000!',amount:2000,icon:'🃏'},
  {text:'Штраф за паркування ₴200.',amount:-200,icon:'🅿️'},
  {text:'Спадщина ₴5000!',amount:5000,icon:'🏠'},
  {text:'Комунальні послуги: ₴800.',amount:-800,icon:'💡'},
  {text:'Стартап вистрілив! Отримайте ₴2500.',amount:2500,icon:'🚀'},
  {text:'Врожай знищено. Заплатіть ₴600.',amount:-600,icon:'🌾'},
];

const ALL_AVATARS=['🚀','🦁','🐉','🌟','🎭','🦊','🐺','🦅','🐋','🔥','💎','🌈'];
const PLAYER_COLORS=['#e53935','#1e88e5','#43a047','#fb8c00'];
const DEFAULT_NAMES=['Гравець 1','Гравець 2','Гравець 3','Гравець 4'];

let players=[], currentPlayerIdx=0, bankMoney=150000;
let diceRolled=false, owned={}, houses={}, jailTurns={}, gameActive=false;
let avatarIdx=[0,1,2,3];
let chanceIdx=0, chestIdx=0;

function setupPlayerRows(){
  const c=document.getElementById('playerRows'); c.innerHTML='';
  for(let i=0;i<4;i++){
    const row=document.createElement('div'); row.className='player-row';
    row.innerHTML=`
      <div class="player-avatar" style="border-color:${PLAYER_COLORS[i]}" onclick="cycleAvatar(${i})" id="avatar${i}">${ALL_AVATARS[i]}</div>
      <input class="player-name-input" id="name${i}" value="${DEFAULT_NAMES[i]}"/>
      <div class="player-color" style="background:${PLAYER_COLORS[i]}"></div>`;
    c.appendChild(row);
  }
}

function cycleAvatar(i){
  avatarIdx[i]=(avatarIdx[i]+1)%ALL_AVATARS.length;
  document.getElementById('avatar'+i).textContent=ALL_AVATARS[avatarIdx[i]];
}

function startGame(){
  players=[];
  for(let i=0;i<4;i++){
    const name=document.getElementById('name'+i).value.trim()||DEFAULT_NAMES[i];
    players.push({name,money:15000,pos:0,avatar:ALL_AVATARS[avatarIdx[i]],color:PLAYER_COLORS[i],bankrupt:false,inJail:false});
  }
  currentPlayerIdx=0; diceRolled=false; owned={}; houses={}; jailTurns={}; bankMoney=150000; gameActive=true; chanceIdx=0; chestIdx=0;
  showScreen('gameScreen'); renderBoard(); renderPlayers(); renderTokens(); updateBank();
  addLog('Гра розпочата! Ходить '+players[0].name,'highlight');
}

function renderBoard(){
  const board=document.getElementById('board'); board.innerHTML='';
  const grid=Array.from({length:11},()=>Array(11).fill(null));
  BOARD.forEach(cell=>{const[r,c]=cell.pos;grid[r-1][c-1]=cell;});

  const center=document.createElement('div');
  center.className='cell center';
  center.innerHTML='<div class="center-logo">🇺🇦</div><div class="center-title">МОНОПОЛІЯ<br>УКРАЇНА</div>';

  for(let r=0;r<11;r++){
    for(let c=0;c<11;c++){
      if(r>=1&&r<=9&&c>=1&&c<=9){if(r===1&&c===1)board.appendChild(center);continue;}
      const cell=grid[r][c];
      if(!cell){const e=document.createElement('div');e.style.background='transparent';board.appendChild(e);continue;}
      const el=document.createElement('div');
      el.className='cell'+(cell.type==='corner'?' corner':'');
      el.id='cell-'+cell.id;
      el.onclick=()=>showCellInfo(cell.id);
      let bar=cell.type==='property'?`<div class="cell-color-bar" style="background:${GROUP_COLORS[cell.group]}"></div>`:'';
      el.innerHTML=`${bar}<div class="cell-icon">${cell.icon}</div><div class="cell-name">${cell.name}</div>${cell.price?`<div class="cell-price">₴${cell.price}</div>`:''}`;
      board.appendChild(el);
    }
  }
  renderOwnedIndicators();
}

function renderOwnedIndicators(){
  Object.entries(owned).forEach(([id,pi])=>{
    const el=document.getElementById('cell-'+id); if(!el)return;
    let ind=el.querySelector('.owned-indicator');
    if(!ind){ind=document.createElement('div');ind.className='owned-indicator';el.appendChild(ind);}
    ind.style.background=players[pi].color;
  });
}

function renderTokens(){
  document.querySelectorAll('.player-token').forEach(t=>t.remove());
  players.forEach((p,i)=>{
    if(p.bankrupt)return;
    const cellEl=document.getElementById('cell-'+p.pos); if(!cellEl)return;
    const tok=document.createElement('div');
    tok.className='player-token'; tok.id='token-'+i; tok.textContent=p.avatar;
    tok.style.background=p.color;
    const off=[[-4,-4],[4,-4],[-4,4],[4,4]];
    tok.style.top=`calc(50% + ${off[i%4][1]}px)`;
    tok.style.left=`calc(50% + ${off[i%4][0]}px)`;
    cellEl.appendChild(tok);
  });
}

function renderPlayers(){
  const bar=document.getElementById('playersBar'); bar.innerHTML='';
  players.forEach((p,i)=>{
    const chip=document.createElement('div');
    chip.className='player-chip'+(i===currentPlayerIdx?' active':'')+(p.bankrupt?' bankrupt':'');
    const cell=BOARD.find(b=>b.id===p.pos);
    chip.innerHTML=`<div class="chip-header"><div class="chip-avatar">${p.avatar}</div><div class="chip-name" style="color:${p.color}">${p.name}</div></div><div class="chip-money">₴${p.money.toLocaleString()}</div><div class="chip-pos">${cell?cell.name:'?'}${p.inJail?' ⛓️':''}</div>`;
    bar.appendChild(chip);
  });
}

function updateBank(){document.getElementById('bankDisplay').textContent='₴'+bankMoney.toLocaleString();}

function rollDice(){
  if(diceRolled)return;
  const p=players[currentPlayerIdx]; if(p.bankrupt){nextTurn();return;}
  const d1=Math.ceil(Math.random()*6),d2=Math.ceil(Math.random()*6),total=d1+d2;
  const F=['','⚀','⚁','⚂','⚃','⚄','⚅'];
  document.getElementById('diceDisplay').innerHTML=`<div class="die">${F[d1]}</div><div class="die">${F[d2]}</div>`;
  addLog(`${p.avatar} ${p.name} кинув ${d1}+${d2}=${total}`);

  if(p.inJail){
    jailTurns[currentPlayerIdx]=(jailTurns[currentPlayerIdx]||0)+1;
    if(d1===d2){p.inJail=false;addLog(`${p.name} вийшов з вязниці!`,'success');}
    else if(jailTurns[currentPlayerIdx]>=3){p.inJail=false;p.money-=500;bankMoney+=500;addLog(`${p.name} заплатив ₴500 за звільнення.`,'danger');}
    else{addLog(`${p.name} у вязниці. Спроба ${jailTurns[currentPlayerIdx]}.`,'danger');diceRolled=true;setTimeout(()=>{diceRolled=false;nextTurn();},1200);return;}
  }

  diceRolled=true;
  document.getElementById('rollBtn').disabled=true;
  movePlayer(currentPlayerIdx,total);
}

function movePlayer(pIdx,steps){
  const p=players[pIdx];
  const oldPos=p.pos;
  const newPos=(oldPos+steps)%40;
  if(newPos<oldPos||(oldPos+steps>=40)){p.money+=2000;bankMoney-=2000;addLog(`${p.name} пройшов СТАРТ! +₴2000`,'success');}
  p.pos=newPos; renderTokens(); renderPlayers();
  setTimeout(()=>landOn(pIdx),600);
}

function landOn(pIdx){
  const p=players[pIdx];
  const cell=BOARD.find(b=>b.id===p.pos); if(!cell){endTurn();return;}
  addLog(`${p.avatar} ${p.name} → ${cell.name}`);

  if(cell.type==='corner'){
    if(cell.id===30){p.pos=10;p.inJail=true;jailTurns[pIdx]=0;renderTokens();showEvent('⛓️','ВЯЗНИЦЯ!',`${p.name} відправлений до вязниці!`,'');return;}
    endTurn();return;
  }
  if(cell.type==='tax'){p.money-=cell.amount;bankMoney+=cell.amount;updateBank();renderPlayers();showTax(cell.name,cell.amount,p.name);return;}
  if(cell.type==='chance'){const card=CHANCE_CARDS[chanceIdx++%CHANCE_CARDS.length];applyCard(card,pIdx,'chance');return;}
  if(cell.type==='chest'){const card=CHEST_CARDS[chestIdx++%CHEST_CARDS.length];applyCard(card,pIdx,'chest');return;}

  if(cell.type==='property'||cell.type==='station'||cell.type==='utility'){
    const ownerIdx=owned[cell.id];
    if(ownerIdx===undefined){
      if(p.money>=cell.price)showBuyProperty(cell.id,pIdx);
      else{addLog(`${p.name} не може купити — недостатньо грошей.`,'danger');endTurn();}
    } else if(ownerIdx===pIdx){addLog(`${p.name} на власній власності.`);endTurn();}
    else{
      const owner=players[ownerIdx]; if(owner.bankrupt){endTurn();return;}
      const rent=calcRent(cell,ownerIdx);
      p.money-=rent; owner.money+=rent; checkBankruptcy(pIdx); renderPlayers();
      showRent(cell.name,rent,owner.name,p.name);
    }
    return;
  }
  endTurn();
}

function calcRent(cell,ownerIdx){
  if(cell.type==='station'){const cnt=BOARD.filter(b=>b.type==='station'&&owned[b.id]===ownerIdx).length;return cell.rent[Math.min(cnt-1,cell.rent.length-1)];}
  if(cell.type==='utility'){const cnt=BOARD.filter(b=>b.type==='utility'&&owned[b.id]===ownerIdx).length;return cnt>=2?1200:600;}
  const h=houses[cell.id]||0;return cell.rent[Math.min(h,cell.rent.length-1)];
}

function applyCard(card,pIdx,type){
  const p=players[pIdx];
  const title=type==='chance'?'ШАНС':'СКАРБНИЦЯ';
  if(card.action==='jail'){p.pos=10;p.inJail=true;jailTurns[pIdx]=0;renderTokens();showEvent(card.icon,title,card.text,'');return;}
  if(card.action==='goto'){p.pos=card.target;if(card.amount){p.money+=card.amount;bankMoney-=card.amount;updateBank();}renderTokens();showEvent(card.icon,title,card.text,`+₴${card.amount}`);return;}
  if(card.action==='collect'){
    let total=0;
    players.forEach((pl,i)=>{if(i!==pIdx&&!pl.bankrupt){pl.money-=card.amount;p.money+=card.amount;total+=card.amount;}});
    renderPlayers();showEvent(card.icon,title,card.text,`+₴${total}`);return;
  }
  if(card.action==='repair'){
    let total=0;
    Object.entries(owned).forEach(([id,pi])=>{if(pi===pIdx)total+=(houses[id]||0)*card.amount;});
    p.money-=total;bankMoney+=total;updateBank();checkBankruptcy(pIdx);renderPlayers();showEvent(card.icon,title,card.text,total>0?`-₴${total}`:'Нема будинків');return;
  }
  if(card.amount>0){p.money+=card.amount;bankMoney-=card.amount;}
  else{p.money+=card.amount;bankMoney-=card.amount;}
  updateBank();checkBankruptcy(pIdx);renderPlayers();
  showEvent(card.icon,title,card.text,(card.amount>=0?'+':'')+`₴${card.amount}`);
}

function showBuyProperty(cellId,pIdx){
  const cell=BOARD.find(b=>b.id===cellId),p=players[pIdx];
  document.getElementById('propIcon').textContent=cell.icon;
  document.getElementById('propName').textContent=cell.name;
  document.getElementById('propGroup').textContent=cell.type==='property'?GROUP_NAMES[cell.group]+' група':cell.type==='station'?'Залізниця/Аеропорт':'Комунальна';
  document.getElementById('propPrice').textContent='₴'+cell.price;
  document.getElementById('propRent').textContent=cell.rent?'₴'+cell.rent[0]:'—';
  document.getElementById('propRentH1').textContent=cell.rent&&cell.rent[1]?'₴'+cell.rent[1]:'—';
  document.getElementById('propRentHotel').textContent=cell.rent&&cell.rent[5]?'₴'+cell.rent[5]:'—';
  document.getElementById('propHousePrice').textContent=cell.housePrice?'₴'+cell.housePrice:'—';
  document.getElementById('buyBtn').onclick=()=>{
    p.money-=cell.price;bankMoney+=cell.price;owned[cellId]=pIdx;
    updateBank();renderOwnedIndicators();renderPlayers();
    addLog(`${p.name} купив ${cell.name} за ₴${cell.price}!`,'success');
    closeModal('propertyModal');
  };
  document.querySelector('#propertyModal .btn-skip').onclick=()=>closeModal('propertyModal');
  openModal('propertyModal');
}

function showCellInfo(cellId){
  if(!gameActive)return;
}

function showEvent(icon,title,text,detail){
  document.getElementById('eventIcon').textContent=icon;
  document.getElementById('eventTitle').textContent=title;
  document.getElementById('eventSubtitle').textContent='';
  document.getElementById('eventBody').innerHTML=`<div style="text-align:center;padding:8px"><div style="font-size:15px;margin-bottom:8px">${text}</div>${detail?`<div style="font-size:22px;font-family:'Unbounded',sans-serif;color:var(--gold)">${detail}</div>`:''}</div>`;
  document.getElementById('eventModal').querySelector('.btn-ok').onclick=()=>closeModal('eventModal');
  openModal('eventModal');
}

function showRent(cellName,rent,ownerName,payerName){
  document.getElementById('rentTitle').textContent='Оренда: '+cellName;
  document.getElementById('rentSubtitle').textContent='Власник: '+ownerName;
  document.getElementById('rentBody').innerHTML=`<div style="text-align:center;padding:8px"><div style="font-size:13px;color:var(--muted);margin-bottom:8px">${payerName} сплачує оренду</div><div style="font-size:28px;font-family:'Unbounded',sans-serif;color:var(--red)">-₴${rent}</div></div>`;
  document.getElementById('rentModal').querySelector('.btn-ok').onclick=()=>closeModal('rentModal');
  openModal('rentModal');
}

function showTax(name,amount,pName){
  document.getElementById('taxTitle').textContent=name;
  document.getElementById('taxSubtitle').textContent=`${pName} сплачує ₴${amount}`;
  renderPlayers();openModal('taxModal');
}

function endTurn(){
  diceRolled=false;
  document.getElementById('rollBtn').disabled=false;
  const active=players.filter(p=>!p.bankrupt);
  if(active.length<=1){showWin(active[0]);return;}
  nextTurn();
}

function nextTurn(){
  do{currentPlayerIdx=(currentPlayerIdx+1)%players.length;}
  while(players[currentPlayerIdx].bankrupt);
  diceRolled=false;
  document.getElementById('rollBtn').disabled=false;
  renderPlayers();
  addLog(`Хід: ${players[currentPlayerIdx].avatar} ${players[currentPlayerIdx].name}`,'highlight');
}

function checkBankruptcy(pIdx){
  const p=players[pIdx];
  if(p.money<0){
    p.bankrupt=true;p.money=0;
    Object.keys(owned).forEach(id=>{if(owned[id]===pIdx)delete owned[id];});
    addLog(`💀 ${p.name} збанкрутував!`,'danger');
    renderOwnedIndicators();
  }
}

function showWin(winner){
  gameActive=false;
  if(!winner)winner=players.reduce((a,b)=>a.money>b.money?a:b);
  document.getElementById('winEmoji').textContent=winner.avatar;
  document.getElementById('winTitle').textContent=winner.name+' перемагає!';
  document.getElementById('winSubtitle').textContent='Переможець Монополії України! 🇺🇦';
  const sorted=[...players].sort((a,b)=>b.money-a.money);
  document.getElementById('endStats').innerHTML=sorted.map((p,i)=>`<div class="stat-row"><span>${['🥇','🥈','🥉','4️⃣'][i]} ${p.avatar} ${p.name}</span><span style="color:${i===0?'var(--gold)':'var(--text)'}">₴${p.money.toLocaleString()}</span></div>`).join('');
  showScreen('winScreen');
}

function resetGame(){showScreen('startScreen');}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');endTurn();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function addLog(msg,cls=''){
  const log=document.getElementById('logArea');
  const e=document.createElement('div');e.className='log-entry'+(cls?' '+cls:'');e.textContent=msg;
  log.prepend(e);while(log.children.length>20)log.removeChild(log.lastChild);
}

setupPlayerRows();
</script>
