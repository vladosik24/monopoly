<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Фон -->
  <rect width="512" height="512" rx="80" fill="#0a0f1e"/>
  
  <!-- Синя смуга (верх) -->
  <rect x="0" y="0" width="512" height="256" rx="80" fill="#005BBB"/>
  <rect x="0" y="176" width="512" height="80" fill="#005BBB"/>
  
  <!-- Жовта смуга (низ) -->
  <rect x="0" y="256" width="512" height="256" rx="80" fill="#FFD700"/>
  <rect x="0" y="256" width="512" height="80" fill="#FFD700"/>

  <!-- Тризуб білий -->
  <g transform="translate(256,245) scale(5.5)" fill="white">
    <!-- центральний стовп -->
    <rect x="-3" y="-22" width="6" height="28"/>
    <!-- верхівка центру -->
    <path d="M-3,-22 Q-3,-34 0,-36 Q3,-34 3,-22Z"/>
    <!-- лівий стовп -->
    <rect x="-16" y="-14" width="6" height="20"/>
    <path d="M-16,-14 Q-16,-26 -13,-28 Q-10,-26 -10,-14Z"/>
    <!-- правий стовп -->
    <rect x="10" y="-14" width="6" height="20"/>
    <path d="M10,-14 Q10,-26 13,-28 Q16,-26 16,-14Z"/>
    <!-- горизонтальна перекладина -->
    <rect x="-16" y="4" width="32" height="5"/>
    <!-- ніжка -->
    <rect x="-8" y="6" width="16" height="8"/>
  </g>
</svg>
